name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-test:
    name: Build & smoke test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Syntax check all JS
        run: |
          set -e
          for f in server.js lib/*.js public/*.js; do
            echo "checking $f"
            node --check "$f"
          done

      - name: Smoke test (server boots & /api/status responds)
        run: |
          set -e
          node server.js &
          SERVER_PID=$!
          trap "kill $SERVER_PID 2>/dev/null || true" EXIT

          # ждём пока поднимется порт (до ~20с)
          for i in $(seq 1 40); do
            if curl -sf http://localhost:3000/api/status > /dev/null; then
              echo "server is up"
              break
            fi
            sleep 0.5
          done

          STATUS=$(curl -sf http://localhost:3000/api/status)
          echo "status: $STATUS"
          echo "$STATUS" | grep -q '"configured"' || { echo "::error::/api/status не ответил ожидаемым JSON"; exit 1; }

          CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/)
          echo "index.html -> HTTP $CODE"
          [ "$CODE" = "200" ] || { echo "::error::главная страница не отдалась (HTTP $CODE)"; exit 1; }
        env:
          PORT: 3000
